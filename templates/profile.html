{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto;">
  <h2>Profile</h2>
  <p style="color:#9ca3af;margin-bottom:1.5rem;">Logged in as <strong>{{ username }}</strong></p>

  <form method="POST">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <input type="password" name="current_password" id="current_password" required class="form-control">
    </div>
    <div class="form-group">
      <label for="new_password">New Password</label>
      <input type="password" name="new_password" id="new_password" required class="form-control" minlength="4">
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" name="confirm_password" id="confirm_password" required class="form-control">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Change Password</button>
  </form>
</div>
{% endblock %}
